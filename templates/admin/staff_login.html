<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – Portail personnel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 16px; padding: 2.5rem 2rem;
      width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .login-brand { text-align: center; margin-bottom: 2rem; }
    .login-brand h1 { font-size: 1.5rem; color: #1e3a5f; margin-top: .5rem; }
    .login-brand .emoji { font-size: 3rem; }
    .login-brand p { color: #64748b; font-size: .9rem; margin-top: .3rem; }

    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-weight: 600; margin-bottom: .4rem; font-size: .9rem; color: #374151; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: .65rem .9rem; border: 1.5px solid #d1d5db;
      border-radius: 8px; font-size: .95rem; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #1e3a5f; }

    .btn-login {
      width: 100%; padding: .75rem;
      background: linear-gradient(135deg, #0f172a, #1e3a5f);
      color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-login:hover { opacity: .88; }

    .error-msg {
      background: #fee2e2; color: #991b1b; padding: .75rem 1rem;
      border-radius: 8px; margin-bottom: 1.2rem; font-size: .9rem;
      border-left: 4px solid #ef4444;
    }

    .hint { text-align: center; margin-top: 1.5rem; color: #94a3b8; font-size: .8rem; }
    .hint a { color: #1e3a5f; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .badge-portal {
      display: inline-block; background: #eff6ff; color: #1e40af;
      border: 1px solid #bfdbfe; border-radius: 20px;
      padding: .2rem .75rem; font-size: .75rem; font-weight: 600;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="emoji">🏫</div>
      <h1>Lycée RGPD</h1>
      <span class="badge-portal">Portail personnel</span>
      <p>Réservé au personnel administratif et enseignant</p>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label for="username">Identifiant</label>
        <input type="text" id="username" name="username" autofocus autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login">Se connecter</button>
    </form>

    <p class="hint">
      Élève ou parent ? <a href="/students/login/">Portail élèves &amp; parents →</a>
    </p>
  </div>
</body>
</html>
